<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="筋トレ">
  <title>筋トレ</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Hiragino Sans', sans-serif;
      background: #0f0f1a; color: #fff; min-height: 100vh; overflow-x: hidden;
    }
    .screen { display: none; min-height: 100vh; padding: 24px 20px; flex-direction: column; align-items: center; justify-content: center; }
    .screen.active { display: flex; }

    /* ── PIN ── */
    .pin-title { font-size: 30px; font-weight: 800; margin-bottom: 8px; letter-spacing: 2px; }
    .pin-sub { font-size: 14px; color: #666; margin-bottom: 40px; }
    .pin-dots { display: flex; gap: 16px; margin-bottom: 40px; }
    .pin-dot { width: 18px; height: 18px; border-radius: 50%; border: 2px solid #a78bfa; transition: background .2s; }
    .pin-dot.filled { background: #a78bfa; }
    .pin-keypad { display: grid; grid-template-columns: repeat(3, 80px); gap: 14px; }
    .pin-btn {
      width: 80px; height: 80px; border-radius: 50%; border: 2px solid #2a2a3e;
      background: #1a1a2e; color: #fff; font-size: 24px; font-weight: 600; cursor: pointer;
      display: flex; align-items: center; justify-content: center; transition: all .15s;
    }
    .pin-btn:active { background: #a78bfa; border-color: #a78bfa; }
    .pin-btn.empty { background: transparent; border-color: transparent; cursor: default; }
    .pin-error { color: #ef4444; margin-top: 16px; height: 22px; font-size: 14px; }

    /* ── Home ── */
    .home-wrap { width: 100%; max-width: 420px; }
    .home-header { text-align: center; margin-bottom: 28px; }
    .home-title {
      font-size: 34px; font-weight: 900;
      background: linear-gradient(135deg, #a78bfa, #60a5fa);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 6px;
    }
    .home-date { color: #666; font-size: 14px; }
    .day-selector { display: flex; gap: 8px; margin-bottom: 24px; justify-content: center; flex-wrap: wrap; }
    .day-btn {
      padding: 7px 14px; border-radius: 20px; border: 2px solid #2a2a3e;
      background: transparent; color: #666; font-size: 14px; font-weight: 600; cursor: pointer; transition: all .2s;
    }
    .day-btn.active { border-color: #a78bfa; color: #a78bfa; background: rgba(167,139,250,.12); }
    .day-btn.rest-day { opacity: .4; }
    .ex-list { width: 100%; display: flex; flex-direction: column; gap: 10px; margin-bottom: 28px; }
    .ex-item {
      background: #1a1a2e; border-radius: 14px; padding: 14px 16px;
      display: flex; align-items: center; gap: 12px;
    }
    .ex-num {
      width: 28px; height: 28px; border-radius: 50%; background: rgba(167,139,250,.18);
      color: #a78bfa; font-size: 12px; font-weight: 700; display: flex; align-items: center;
      justify-content: center; flex-shrink: 0;
    }
    .ex-info { flex: 1; }
    .ex-name { font-size: 15px; font-weight: 600; margin-bottom: 2px; }
    .ex-sets { font-size: 12px; color: #666; }
    .rest-badge { font-size: 11px; padding: 3px 9px; border-radius: 10px; background: rgba(96,165,250,.18); color: #60a5fa; flex-shrink: 0; }
    .start-btn {
      width: 100%; padding: 18px; border-radius: 16px;
      background: linear-gradient(135deg, #a78bfa, #60a5fa);
      color: #fff; font-size: 18px; font-weight: 700; border: none; cursor: pointer; transition: opacity .2s;
    }
    .start-btn:active { opacity: .8; }
    .rest-day-msg { text-align: center; color: #666; font-size: 17px; padding: 40px 0 56px; line-height: 2; }

    /* ── Exercise ── */
    .ex-screen-wrap { width: 100%; max-width: 420px; }
    .progress-track { width: 100%; height: 4px; background: #1a1a2e; border-radius: 2px; margin-bottom: 24px; }
    .progress-fill { height: 100%; background: linear-gradient(90deg,#a78bfa,#60a5fa); border-radius: 2px; transition: width .4s ease; }
    .ex-meta { display: flex; justify-content: space-between; margin-bottom: 8px; font-size: 13px; color: #666; }
    .ex-meta-set { color: #a78bfa; font-weight: 600; }
    .ex-name-big { font-size: 28px; font-weight: 800; line-height: 1.2; margin-bottom: 6px; }
    .ex-sets-big { font-size: 19px; color: #a78bfa; font-weight: 600; margin-bottom: 24px; }
    .set-dots { display: flex; gap: 8px; justify-content: center; margin-bottom: 20px; min-height: 20px; }
    .set-dot { width: 11px; height: 11px; border-radius: 50%; border: 2px solid #a78bfa; transition: background .2s; }
    .set-dot.done { background: #a78bfa; }
    .set-dot.curr { border-color: #60a5fa; box-shadow: 0 0 8px #60a5fa; }
    .timer-wrap { display: flex; justify-content: center; margin-bottom: 24px; }
    .timer-ring { position: relative; width: 190px; height: 190px; }
    .timer-ring svg { transform: rotate(-90deg); }
    .t-bg { fill: none; stroke: #1a1a2e; stroke-width: 8; }
    .t-prog { fill: none; stroke-width: 8; stroke-linecap: round; transition: stroke-dashoffset 1s linear; }
    .t-prog.ex-prog { stroke: #a78bfa; }
    .t-prog.rest-prog { stroke: #60a5fa; }
    .timer-num {
      position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%);
      font-size: 52px; font-weight: 800; color: #fff;
    }
    .points-card {
      background: #1a1a2e; border-radius: 14px; padding: 14px 16px;
      margin-bottom: 24px; border-left: 3px solid #a78bfa;
    }
    .points-label { font-size: 10px; color: #555; text-transform: uppercase; letter-spacing: 1.2px; margin-bottom: 8px; }
    .points-text { font-size: 14px; color: #ccc; line-height: 1.7; }
    .action-row { display: flex; gap: 12px; }
    .btn-skip {
      padding: 17px 18px; border-radius: 14px; border: 2px solid #2a2a3e;
      background: #1a1a2e; color: #666; font-size: 15px; font-weight: 600; cursor: pointer;
    }
    .btn-skip:active { background: #222; }
    .btn-done {
      flex: 1; padding: 17px; border-radius: 14px;
      background: linear-gradient(135deg,#a78bfa,#60a5fa);
      color: #fff; font-size: 17px; font-weight: 700; border: none; cursor: pointer; transition: opacity .2s;
    }
    .btn-done:active { opacity: .8; }

    /* ── Rest ── */
    .rest-wrap { text-align: center; width: 100%; max-width: 420px; }
    .rest-label { font-size: 22px; font-weight: 700; color: #60a5fa; margin-bottom: 24px; }
    .rest-next-label { font-size: 13px; color: #555; margin-bottom: 6px; }
    .rest-next-name { font-size: 20px; font-weight: 700; color: #a78bfa; margin-bottom: 28px; }
    .btn-skip-rest {
      width: 100%; padding: 17px; border-radius: 14px; border: 2px solid #a78bfa;
      background: transparent; color: #a78bfa; font-size: 16px; font-weight: 700; cursor: pointer;
    }
    .btn-skip-rest:active { background: rgba(167,139,250,.1); }

    /* ── Setup URL ── */
    .setup-wrap { width: 100%; max-width: 420px; }
    .setup-title { font-size: 24px; font-weight: 800; margin-bottom: 8px; }
    .setup-desc { font-size: 14px; color: #666; line-height: 1.7; margin-bottom: 28px; }
    .setup-input {
      width: 100%; padding: 14px 16px; border-radius: 14px; border: 2px solid #2a2a3e;
      background: #1a1a2e; color: #fff; font-size: 13px; margin-bottom: 12px; outline: none;
    }
    .setup-input:focus { border-color: #a78bfa; }
    .setup-skip { background: none; border: none; color: #555; font-size: 14px; cursor: pointer; margin-top: 8px; }

    /* ── Settings btn ── */
    .settings-btn {
      position: absolute; top: 24px; right: 20px;
      background: none; border: none; color: #444; font-size: 22px; cursor: pointer; padding: 4px;
    }

    /* ── Rep Count ── */
    .count-wrap { display: flex; justify-content: center; margin-bottom: 16px; }
    .count-circle {
      width: 190px; height: 190px; border-radius: 50%;
      border: 8px solid #2a2a3e;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      background: #1a1a2e;
      transition: border-color .12s, box-shadow .12s;
    }
    .count-circle.beat { border-color: #a78bfa; box-shadow: 0 0 28px rgba(167,139,250,.45); }
    .count-num-big { font-size: 58px; font-weight: 800; color: #fff; line-height: 1; }
    .count-of { font-size: 16px; color: #555; margin-top: 6px; }
    .speed-tag { text-align: center; font-size: 13px; color: #666; margin-bottom: 20px; }
    .speed-tag span { color: #a78bfa; font-weight: 600; }

    /* ── Complete ── */
    .complete-wrap { text-align: center; }
    .complete-icon { font-size: 72px; margin-bottom: 20px; }
    .complete-title {
      font-size: 34px; font-weight: 900; margin-bottom: 10px;
      background: linear-gradient(135deg,#a78bfa,#60a5fa);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }
    .complete-sub { font-size: 16px; color: #666; margin-bottom: 40px; }
    .btn-home {
      width: 220px; padding: 16px; border-radius: 14px;
      background: linear-gradient(135deg,#a78bfa,#60a5fa);
      color: #fff; font-size: 17px; font-weight: 700; border: none; cursor: pointer;
    }
  </style>
</head>
<body>

<!-- ─── PIN ─── -->
<div id="pin-screen" class="screen active">
  <div class="pin-title">🏋️ 筋トレ</div>
  <div class="pin-sub" id="pin-sub">PINを入力してください</div>
  <div class="pin-dots" id="pin-dots">
    <div class="pin-dot"></div><div class="pin-dot"></div>
    <div class="pin-dot"></div><div class="pin-dot"></div>
  </div>
  <div class="pin-keypad">
    <button class="pin-btn" onclick="pinInput(1)">1</button>
    <button class="pin-btn" onclick="pinInput(2)">2</button>
    <button class="pin-btn" onclick="pinInput(3)">3</button>
    <button class="pin-btn" onclick="pinInput(4)">4</button>
    <button class="pin-btn" onclick="pinInput(5)">5</button>
    <button class="pin-btn" onclick="pinInput(6)">6</button>
    <button class="pin-btn" onclick="pinInput(7)">7</button>
    <button class="pin-btn" onclick="pinInput(8)">8</button>
    <button class="pin-btn" onclick="pinInput(9)">9</button>
    <button class="pin-btn empty"></button>
    <button class="pin-btn" onclick="pinInput(0)">0</button>
    <button class="pin-btn" onclick="pinDelete()">⌫</button>
  </div>
  <div class="pin-error" id="pin-error"></div>
</div>

<!-- ─── URL SETUP ─── -->
<div id="setup-screen" class="screen">
  <div class="setup-wrap">
    <div class="setup-title">⚙️ シート連携</div>
    <div class="setup-desc">
      Google Apps Script のデプロイURLを入力してください。<br>
      スキップするとアプリ内のデータを使用します。
    </div>
    <input class="setup-input" id="setup-url-input" type="url"
      placeholder="https://script.google.com/macros/s/..." />
    <button class="btn-done" style="width:100%" onclick="saveSheetUrl()">保存して開始</button>
    <br>
    <button class="setup-skip" onclick="skipSheetUrl()">スキップ（後で設定）</button>
  </div>
</div>

<!-- ─── HOME ─── -->
<div id="home-screen" class="screen" style="position:relative">
  <button class="settings-btn" onclick="showScreen('setup-screen');document.getElementById('setup-url-input').value=localStorage.getItem('workout_api')||''">⚙️</button>
  <div class="home-wrap">
    <div class="home-header">
      <div class="home-title">筋トレ</div>
      <div class="home-date" id="home-date"></div>
    </div>
    <div class="day-selector" id="day-selector">
      <button class="day-btn" onclick="selectDay('月')">月</button>
      <button class="day-btn" onclick="selectDay('火')">火</button>
      <button class="day-btn" onclick="selectDay('水')">水</button>
      <button class="day-btn" onclick="selectDay('木')">木</button>
      <button class="day-btn" onclick="selectDay('金')">金</button>
      <button class="day-btn rest-day" onclick="selectDay('土')">土</button>
      <button class="day-btn rest-day" onclick="selectDay('日')">日</button>
    </div>
    <div class="ex-list" id="ex-list"></div>
    <button class="start-btn" id="start-btn" onclick="startWorkout()">開始する →</button>
  </div>
</div>

<!-- ─── EXERCISE ─── -->
<div id="exercise-screen" class="screen">
  <div class="ex-screen-wrap">
    <div class="progress-track"><div class="progress-fill" id="prog-fill"></div></div>
    <div class="ex-meta">
      <span id="ex-counter"></span>
      <span class="ex-meta-set" id="set-ind"></span>
    </div>
    <div class="ex-name-big" id="ex-name"></div>
    <div class="ex-sets-big" id="ex-sets"></div>
    <div id="timer-section" style="display:none">
      <div class="timer-wrap">
        <div class="timer-ring">
          <svg width="190" height="190" viewBox="0 0 190 190">
            <circle class="t-bg" cx="95" cy="95" r="83"/>
            <circle class="t-prog ex-prog" id="ex-circle" cx="95" cy="95" r="83"
              stroke-dasharray="521" stroke-dashoffset="0"/>
          </svg>
          <div class="timer-num" id="ex-timer-num">0</div>
        </div>
      </div>
    </div>
    <div id="count-section" style="display:none">
      <div class="count-wrap">
        <div class="count-circle" id="count-circle">
          <div class="count-num-big" id="count-num">0</div>
          <div class="count-of" id="count-of"></div>
        </div>
      </div>
      <div class="speed-tag" id="speed-tag"></div>
    </div>
    <div class="set-dots" id="set-dots"></div>
    <div class="points-card" id="points-card" style="display:none">
      <div class="points-label">ポイント</div>
      <div class="points-text" id="points-text"></div>
    </div>
    <div class="action-row">
      <button class="btn-skip" onclick="skipExercise()">スキップ</button>
      <button class="btn-done" id="done-btn" onclick="completeSet()">完了</button>
    </div>
  </div>
</div>

<!-- ─── REST ─── -->
<div id="rest-screen" class="screen">
  <div class="rest-wrap">
    <div class="rest-label">休憩</div>
    <div class="timer-wrap">
      <div class="timer-ring">
        <svg width="190" height="190" viewBox="0 0 190 190">
          <circle class="t-bg" cx="95" cy="95" r="83"/>
          <circle class="t-prog rest-prog" id="rest-circle" cx="95" cy="95" r="83"
            stroke-dasharray="521" stroke-dashoffset="0"/>
        </svg>
        <div class="timer-num" id="rest-timer-num">0</div>
      </div>
    </div>
    <div class="rest-next-label">次</div>
    <div class="rest-next-name" id="rest-next-name"></div>
    <button class="btn-skip-rest" onclick="skipRest()">スキップ</button>
  </div>
</div>

<!-- ─── COMPLETE ─── -->
<div id="complete-screen" class="screen">
  <div class="complete-wrap">
    <div class="complete-icon">🎉</div>
    <div class="complete-title">お疲れ様！</div>
    <div class="complete-sub" id="complete-sub"></div>
    <button class="btn-home" onclick="goHome()">ホームへ戻る</button>
  </div>
</div>

<script>
// ─── CONFIG ──────────────────────────────────────────────────────────
// PIN・SHEET_API ともにコードには書かず、localStorageで管理します

// ─── WORKOUT DATA ────────────────────────────────────────────────────
let workoutData = { '月':[], '火':[], '水':[], '木':[], '金':[], '土':[], '日':[] };
let sheetLoadError = false;

// ─── SHEET LOADER ────────────────────────────────────────────────────
async function loadSheetData() {
  const SHEET_API = localStorage.getItem('workout_api') || '';
  sheetLoadError = false;
  if (!SHEET_API) { sheetLoadError = 'url'; return; }
  try {
    document.getElementById('ex-list').innerHTML =
      '<div style="color:#555;text-align:center;padding:32px">読み込み中...</div>';
    const res = await fetch(SHEET_API);
    const exercises = await res.json();
    workoutData = { '月':[], '火':[], '水':[], '木':[], '金':[], '土':[], '日':[] };
    exercises.forEach(ex => {
      ex.days.forEach(d => {
        if (workoutData[d] !== undefined) {
          workoutData[d].push({
            name: ex.name, sets: ex.sets, disp: ex.disp,
            timed: ex.timed, dur: ex.dur, rest: ex.rest, pts: ex.pts,
            speed: ex.speed || '', reps: ex.reps || 0
          });
        }
      });
    });
  } catch(e) {
    sheetLoadError = 'fetch';
  }
}

// ─── STATE ──────────────────────────────────────────────────────────
let pinVal = '', pinSetupFirst = '', pinMode = 'enter'; // enter | setup | confirm
let currentDay = '', todayList = [], exIdx = 0, setIdx = 0, tick = null, repTick = null;

// ─── PIN ─────────────────────────────────────────────────────────────
window.addEventListener('load', () => {
  if (!localStorage.getItem('workout_pin')) {
    pinMode = 'setup';
    document.getElementById('pin-sub').textContent = '新しいPINを設定してください';
  }
});

function pinInput(n) {
  if (pinVal.length >= 4) return;
  pinVal += n;
  renderPinDots();
  if (pinVal.length === 4) setTimeout(handlePin, 120);
}
function pinDelete() { pinVal = pinVal.slice(0,-1); renderPinDots(); }
function renderPinDots() {
  document.querySelectorAll('.pin-dot').forEach((d,i) => d.classList.toggle('filled', i < pinVal.length));
}
async function hashPin(pin) {
  const encoded = new TextEncoder().encode(pin);
  const hash = await crypto.subtle.digest('SHA-256', encoded);
  return Array.from(new Uint8Array(hash))
    .map(b => b.toString(16).padStart(2, '0')).join('');
}
async function handlePin() {
  if (pinMode === 'enter') {
    await checkPin();
  } else if (pinMode === 'setup') {
    pinSetupFirst = pinVal;
    pinVal = '';
    renderPinDots();
    pinMode = 'confirm';
    document.getElementById('pin-sub').textContent = 'もう一度入力してください';
  } else if (pinMode === 'confirm') {
    if (pinVal === pinSetupFirst) {
      localStorage.setItem('workout_pin', await hashPin(pinVal));
      pinMode = 'enter';
      // PIN設定完了 → URLが未設定なら設定画面へ
      if (!localStorage.getItem('workout_api')) {
        showScreen('setup-screen');
      } else {
        showScreen('home-screen'); initHome();
      }
    } else {
      document.getElementById('pin-error').textContent = 'PINが一致しません。最初からやり直します';
      pinVal = ''; pinSetupFirst = ''; pinMode = 'setup';
      renderPinDots();
      document.getElementById('pin-sub').textContent = '新しいPINを設定してください';
      setTimeout(() => document.getElementById('pin-error').textContent = '', 2000);
    }
  }
}
async function checkPin() {
  if (await hashPin(pinVal) === localStorage.getItem('workout_pin')) {
    showScreen('home-screen'); initHome();
  } else {
    document.getElementById('pin-error').textContent = 'PINが違います';
    pinVal = ''; renderPinDots();
    setTimeout(() => document.getElementById('pin-error').textContent = '', 1600);
  }
}

// ─── URL SETUP ───────────────────────────────────────────────────────
function saveSheetUrl() {
  const url = document.getElementById('setup-url-input').value.trim();
  if (url) localStorage.setItem('workout_api', url);
  showScreen('home-screen'); initHome();
}
function skipSheetUrl() {
  showScreen('home-screen'); initHome();
}

// ─── HOME ────────────────────────────────────────────────────────────
async function initHome() {
  const d = new Date();
  const jpDays = ['日','月','火','水','木','金','土'];
  const jpDayNames = ['日曜日','月曜日','火曜日','水曜日','木曜日','金曜日','土曜日'];
  const today = jpDays[d.getDay()];
  document.getElementById('home-date').textContent =
    `${d.getFullYear()}年${d.getMonth()+1}月${d.getDate()}日（${jpDayNames[d.getDay()]}）`;
  await loadSheetData(); // シートからデータ取得（URLが設定されている場合）
  selectDay(today);
}

function selectDay(day) {
  currentDay = day;
  document.querySelectorAll('.day-btn').forEach(b => b.classList.toggle('active', b.textContent === day));
  todayList = workoutData[day] || [];
  renderList();
}

function renderList() {
  const list = document.getElementById('ex-list');
  const btn  = document.getElementById('start-btn');
  if (sheetLoadError === 'url') {
    list.innerHTML = '<div class="rest-day-msg" style="color:#ef4444">⚠️ シートのURLが未設定です<br><small style="color:#666">⚙️ から設定してください</small></div>';
    btn.style.display = 'none'; return;
  }
  if (sheetLoadError === 'fetch') {
    list.innerHTML = '<div class="rest-day-msg" style="color:#ef4444">⚠️ シートの読み込みに失敗しました<br><small style="color:#666">通信状況を確認してください</small></div>';
    btn.style.display = 'none'; return;
  }
  if (!todayList.length) {
    list.innerHTML = '<div class="rest-day-msg">今日は休息日です 🛌<br>しっかり回復しましょう</div>';
    btn.style.display = 'none'; return;
  }
  btn.style.display = 'block';
  list.innerHTML = todayList.map((ex,i) => `
    <div class="ex-item">
      <div class="ex-num">${i+1}</div>
      <div class="ex-info">
        <div class="ex-name">${ex.name}</div>
        <div class="ex-sets">${ex.disp}</div>
      </div>
      ${ex.rest ? `<div class="rest-badge">休${ex.rest}秒</div>` : ''}
    </div>`).join('');
}

// ─── WORKOUT ─────────────────────────────────────────────────────────
function startWorkout() { exIdx = 0; setIdx = 0; showScreen('exercise-screen'); renderExercise(); }

function renderExercise() {
  const ex = todayList[exIdx];
  if (!ex) { showComplete(); return; }
  clearTick();

  document.getElementById('prog-fill').style.width = (exIdx / todayList.length * 100) + '%';
  document.getElementById('ex-counter').textContent = `${exIdx+1} / ${todayList.length}`;
  document.getElementById('set-ind').textContent = ex.sets > 1 ? `セット ${setIdx+1} / ${ex.sets}` : '';
  document.getElementById('ex-name').textContent = ex.name;
  document.getElementById('ex-sets').textContent = ex.disp;

  // set dots
  const dotsEl = document.getElementById('set-dots');
  dotsEl.innerHTML = ex.sets > 1
    ? Array.from({length: ex.sets}, (_,i) =>
        `<div class="set-dot ${i < setIdx ? 'done' : i === setIdx ? 'curr' : ''}"></div>`).join('')
    : '';

  // points
  const pc = document.getElementById('points-card');
  if (ex.pts) { pc.style.display = 'block'; document.getElementById('points-text').textContent = ex.pts; }
  else { pc.style.display = 'none'; }

  // timed vs counted vs rep
  const ts = document.getElementById('timer-section');
  const cs = document.getElementById('count-section');
  const db = document.getElementById('done-btn');
  clearRepTick();
  if (ex.timed) {
    ts.style.display = 'block'; cs.style.display = 'none'; db.textContent = '次へ';
    startCountdown('ex-timer-num', 'ex-circle', ex.dur, () => { playBeep(); completeSet(); });
  } else if (ex.speed && ex.reps > 0) {
    ts.style.display = 'none'; cs.style.display = 'block'; db.textContent = '完了';
    document.getElementById('count-num').textContent = '0';
    document.getElementById('count-of').textContent = `/ ${ex.reps}`;
    document.getElementById('speed-tag').innerHTML = `テンポ: <span>${ex.speed}</span>`;
    document.getElementById('count-circle').classList.remove('beat');
    startRepCount(ex.reps, ex.speed, () => completeSet());
  } else {
    ts.style.display = 'none'; cs.style.display = 'none'; db.textContent = '完了';
  }
}

function completeSet() {
  clearTick(); clearRepTick();
  const ex = todayList[exIdx];
  setIdx++;
  if (setIdx < ex.sets) {
    // more sets for same exercise
    ex.rest > 0 ? showRest(ex.rest) : renderExercise();
  } else {
    // all sets done → advance
    setIdx = 0; exIdx++;
    const prevRest = ex.rest;
    if (exIdx < todayList.length && prevRest > 0) {
      showRest(prevRest);
    } else {
      renderExercise();
    }
  }
}

function skipExercise() { clearTick(); clearRepTick(); setIdx = 0; exIdx++; renderExercise(); }

// ─── REST ────────────────────────────────────────────────────────────
function showRest(duration) {
  showScreen('rest-screen');
  const nextEx = todayList[exIdx];
  let nextLabel = '完了';
  if (nextEx) {
    nextLabel = setIdx > 0
      ? `${nextEx.name}（セット ${setIdx+1} / ${nextEx.sets}）`
      : nextEx.name;
  }
  document.getElementById('rest-next-name').textContent = nextLabel;
  startCountdown('rest-timer-num', 'rest-circle', duration, () => { playBeep(); endRest(); });
}

function skipRest() { clearTick(); endRest(); }

function endRest() { showScreen('exercise-screen'); renderExercise(); }

// ─── COMPLETE ────────────────────────────────────────────────────────
function showComplete() {
  showScreen('complete-screen');
  const names = { '月':'月曜日','火':'火曜日','水':'水曜日','木':'木曜日','金':'金曜日' };
  document.getElementById('complete-sub').textContent =
    `${names[currentDay] || currentDay}のメニュー完了！`;
}
function goHome() { showScreen('home-screen'); initHome(); }

// ─── TIMER ───────────────────────────────────────────────────────────
const CIRC = 521; // 2π×83

function startCountdown(numId, circId, total, onDone) {
  let remaining = total;
  updateRing(numId, circId, remaining, total);
  tick = setInterval(() => {
    remaining--;
    updateRing(numId, circId, remaining, total);
    if (remaining <= 0) { clearTick(); onDone(); }
  }, 1000);
}

function updateRing(numId, circId, remaining, total) {
  document.getElementById(numId).textContent = remaining;
  const offset = CIRC * (1 - Math.max(remaining, 0) / total);
  document.getElementById(circId).style.strokeDashoffset = offset;
}

function clearTick() { if (tick) { clearInterval(tick); tick = null; } }

function startRepCount(reps, speed, onDone) {
  let current = 0;
  const interval = speed === '遅い' ? 3000 : speed === '速い' ? 1000 : 2000;
  const circEl = document.getElementById('count-circle');
  const numEl = document.getElementById('count-num');

  function beat() {
    current++;
    numEl.textContent = current;
    circEl.classList.add('beat');
    setTimeout(() => circEl.classList.remove('beat'), 200);
    playTick();
    if (current >= reps) {
      clearRepTick();
      setTimeout(() => { playBeep(); onDone(); }, interval);
    }
  }
  repTick = setInterval(beat, interval);
}

function clearRepTick() { if (repTick) { clearInterval(repTick); repTick = null; } }

function playTick() {
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain); gain.connect(ctx.destination);
    osc.frequency.value = 523; osc.type = 'sine';
    const t = ctx.currentTime;
    gain.gain.setValueAtTime(0.18, t);
    gain.gain.exponentialRampToValueAtTime(0.01, t + 0.09);
    osc.start(t); osc.stop(t + 0.09);
  } catch(e) {}
  if (navigator.vibrate) navigator.vibrate(20);
}

// ─── SOUND ───────────────────────────────────────────────────────────
function playBeep() {
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    [880, 1100].forEach((freq, i) => {
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.connect(gain); gain.connect(ctx.destination);
      osc.frequency.value = freq; osc.type = 'sine';
      const t = ctx.currentTime + i * 0.18;
      gain.gain.setValueAtTime(0.4, t);
      gain.gain.exponentialRampToValueAtTime(0.01, t + 0.25);
      osc.start(t); osc.stop(t + 0.25);
    });
  } catch(e) {}
  if (navigator.vibrate) navigator.vibrate([100, 80, 100]);
}

// ─── UTIL ────────────────────────────────────────────────────────────
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}
</script>
